name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller pyqt6 pyqtgraph numpy pandas scipy lasio

      - name: Build exe
        run: pyinstaller --clean v6_6.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WellCorrelator.exe
          path: dist/WellCorrelator.exe
